<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuit Site</title>
    <!-- Connects your external CSS file -->
    <link rel="stylesheet" href="hi_joe.css">
</head>
<body style="background-color: rgb(248, 244, 244);">

    <!-- The main box that splits the screen -->
    <div class="screen-container">
        
        <!-- Left Side (Takes 25%) -->
        <div class="left-side">
            <button class="help-btn" onclick="help()">help</button>
            <button class="red-btn" onclick="toggleBackground()">change theme</button>
            <button class="circuits-btn" onclick="loadCircuits()">Show Circuits</button>
            <!-- Left content can go here later -->
        </div>
        
        <!-- Right Side (Takes 75%) -->
        <div class="right-side">
            <div class="title-container">
                <h1 id="titleText">circuit site</h1>
            </div>
            <div id="circuitsContainer" class="circuits-container" style="display: none;"></div>
        </div>

    </div>

    <!-- Connects your external JavaScript file -->
    <script src="hi_joe.js"></script>
</body>
</html>
